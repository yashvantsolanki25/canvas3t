apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: canvas3t-ingress
  namespace: canvas3t
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/load-balancer-name: canvas3t-alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/tags: Environment=production,Application=canvas3t
    # HTTP only on raw ALB URL — HTTPS works on myart.run.place via ACM cert
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-south-1:066255738814:certificate/5307d065-1488-4cf0-b29d-2559e9524fdb
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    # Health check must hit /api/health (returns 200), not / (returns 404 on backend)
    alb.ingress.kubernetes.io/healthcheck-path: /api/health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    alb.ingress.kubernetes.io/success-codes: "200"
spec:
  rules:
  # myart.run.place — HTTPS works here via ACM cert
  - host: myart.run.place
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: canvas3t-backend
            port:
              number: 5000
      - path: /media
        pathType: Prefix
        backend:
          service:
            name: canvas3t-backend
            port:
              number: 5000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: canvas3t-frontend
            port:
              number: 4173
  # Catch-all — raw ALB URL works on HTTP (no cert mismatch)
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: canvas3t-backend
            port:
              number: 5000
      - path: /media
        pathType: Prefix
        backend:
          service:
            name: canvas3t-backend
            port:
              number: 5000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: canvas3t-frontend
            port:
              number: 4173
