---
# StorageClass using EBS CSI driver
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: canvas3t-ebs
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
allowVolumeExpansion: true
parameters:
  type: gp3
  encrypted: "false"

---
# PVC for SQLite database
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: canvas3t-db-ebs
  namespace: canvas3t
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: canvas3t-ebs
  resources:
    requests:
      storage: 5Gi

---
# PVC for uploaded images
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: canvas3t-images-ebs
  namespace: canvas3t
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: canvas3t-ebs
  resources:
    requests:
      storage: 20Gi
