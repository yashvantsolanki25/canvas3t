apiVersion: v1
kind: Namespace
metadata:
  name: canvas3t
  labels:
    environment: production

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: canvas3t-config
  namespace: canvas3t
data:
  FLASK_ENV: "production"
  FLASK_APP: "app"
  RESULTS_PER_PAGE: "24"
  IMAGE_DIR: "/app/images"
  DB_PATH: "/app/db/app.db"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

---
apiVersion: v1
kind: Secret
metadata:
  name: canvas3t-secrets
  namespace: canvas3t
type: Opaque
stringData:
  # IMPORTANT: Change these in production!
  SECRET_KEY: "canvas3t-production-secret-key-please-change-this-to-something-secure"
  DB_PASSWORD: "canvas3t-db-password-change-this"
  JWT_SECRET: "canvas3t-jwt-secret-change-this"
