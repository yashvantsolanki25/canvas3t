apiVersion: apps/v1
kind: Deployment
metadata:
  name: canvas3t-backend
  namespace: canvas3t
  labels:
    app: canvas3t-backend
    component: backend
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: canvas3t-backend
  template:
    metadata:
      labels:
        app: canvas3t-backend
        component: backend
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: default
      securityContext:
        fsGroup: 1000
      
      containers:
      - name: backend
        image: "066255738814.dkr.ecr.ap-south-1.amazonaws.com/canvas3t-backend:latest"
        imagePullPolicy: Always
        
        ports:
        - containerPort: 5000
          name: http
          protocol: TCP
        
        envFrom:
        - configMapRef:
            name: canvas3t-config
        - secretRef:
            name: canvas3t-secrets
        
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1
        
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
          successThreshold: 1
        
        startupProbe:
          httpGet:
            path: /api/health
            port: 5000
            scheme: HTTP
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30
        
        volumeMounts:
        - name: data
          mountPath: /data
        
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
            add:
              - NET_BIND_SERVICE
      
      volumes:
      - name: data
        emptyDir: {}

      
      imagePullSecrets:
      - name: ecr-secret
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - canvas3t-backend
              topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: canvas3t-backend
  namespace: canvas3t
  labels:
    app: canvas3t-backend
    component: backend
spec:
  type: ClusterIP
  sessionAffinity: None
  ports:
  - name: http
    port: 5000
    targetPort: 5000
    protocol: TCP
  selector:
    app: canvas3t-backend

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: canvas3t-backend-pdb
  namespace: canvas3t
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: canvas3t-backend
